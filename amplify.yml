version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - yarn install
        build:
          commands:
            - env | grep -E "^(DISCORD_CLIENT_SECRET|DISCORD_REDIRECT_URI|SESSIONS_TABLE|CANVAS_PIXELS_TABLE|RATE_LIMITS_TABLE|CUSTOM_AWS_REGION|NEXT_PUBLIC_)" >> .env.production
            - yarn build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
